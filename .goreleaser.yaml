version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: focus
    main: ./cmd/focus
    binary: focus
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/evanstern/focus/internal/cli.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: focus
    builds:
      - focus
    name_template: >-
      focus-{{ .Version }}-{{ .Os }}-{{ .Arch }}
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: evanstern
    name: focus
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
