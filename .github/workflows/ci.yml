name: ci

on:
  push:
    branches:
      - main
      - v2
      - "feature/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -race -count=1
